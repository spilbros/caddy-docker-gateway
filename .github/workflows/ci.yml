name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Validate compose file
        run: |
          cp .env.example .env
          docker compose config --quiet

  build:
    name: Build & scan image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: caddy-proxy-cloudflare:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test binary and plugins
        run: |
          docker run --rm caddy-proxy-cloudflare:ci caddy version
          docker run --rm caddy-proxy-cloudflare:ci caddy list-modules | grep -E 'docker_proxy|dns.providers.cloudflare'

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: caddy-proxy-cloudflare:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
